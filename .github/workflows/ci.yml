name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  extension:
    name: Extension — Type-check, Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: extension/package-lock.json

      - name: Install dependencies
        working-directory: extension
        run: npm ci

      - name: Type-check
        working-directory: extension
        run: npm run type-check

      - name: Lint (ESLint 9 flat config)
        working-directory: extension
        # ESLint 9 uses flat config — do NOT pass --ext (deprecated/ignored)
        # --max-warnings 0 would be strict; we allow up to 200 warnings
        run: npx eslint src --max-warnings 200

      - name: Tests
        working-directory: extension
        run: npm test

      - name: Build
        working-directory: extension
        run: npm run build

  server:
    name: Server — Type-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        working-directory: server
        run: npm ci

      - name: Type-check
        working-directory: server
        run: npm run type-check
